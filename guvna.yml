protected:
  - "src/auth/**"
  - "migrations/**"
  - "Dockerfile"
  - "package.json"
  - "pnpm-lock.yaml"

agents:
  dependabot[bot]:
    allow:
      - "package.json"
      - "pnpm-lock.yaml"
  renovate[bot]:
    allow:
      - "package.json"
      - "pnpm-lock.yaml"
  boilerpot:
    allow:
      - "Dockerfile"

agent_logins:
  - "boilerpot"

show_agent_decisions: true

reviewers:
  - boilerpot
